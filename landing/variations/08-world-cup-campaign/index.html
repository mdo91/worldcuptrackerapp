<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>goallll — Every World Cup moment. One app.</title>
  <link rel="stylesheet" href="../../src/css/tokens.css">
  <link rel="stylesheet" href="../../src/css/shared.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="campaign-banner" aria-hidden="true">
    <span>🏆 WORLD CUP 2026</span>
  </div>

  <header class="campaign-header">
    <a href="../../index.html" class="logo" data-copy="appName">goallll</a>
    <button class="nav-toggle" aria-label="Menu" aria-expanded="false">☰</button>
    <nav class="nav-links">
      <a href="#features">Features</a>
      <a href="#how">How it works</a>
      <a href="#pricing">Pricing</a>
    </nav>
  </header>

  <main>
    <section class="campaign-hero">
      <div class="hero-bg-pattern" aria-hidden="true"></div>
      <div class="container hero-campaign reveal">
        <p class="event-tag">The tournament starts here</p>
        <h1 data-copy="heroHeadline"></h1>
        <p data-copy="heroSubheadline"></p>
        <a href="#" class="campaign-cta">Download on the App Store</a>
        <div class="hero-phones">
          <div class="phone-mockup"><div class="phone-mockup__bezel"><img src="/src/img/1.png" alt="Follow every match in real time with live score" loading="lazy"></div></div>
          <div class="phone-mockup offset"><div class="phone-mockup__bezel"><img src="/src/img/3.png" alt="Track group tables and qualification zones" loading="lazy"></div></div>
        </div>
      </div>
    </section>

    <section id="features" class="campaign-features">
      <div class="container">
        <h2 class="campaign-heading reveal">Your World Cup companion</h2>
        <div class="campaign-cards">
          <article class="camp-card reveal" data-feature="live-scores">
            <div class="camp-icon">⚽</div>
            <h3 data-slot="title"></h3><p data-slot="desc"></p>
            <img src="/src/img/1.png" alt="" loading="lazy" class="camp-shot">
          </article>
          <article class="camp-card reveal" data-feature="daily-schedule">
            <div class="camp-icon">📅</div>
            <h3 data-slot="title"></h3><p data-slot="desc"></p>
            <img src="/src/img/2.png" alt="" loading="lazy" class="camp-shot">
          </article>
          <article class="camp-card reveal" data-feature="groups-standings">
            <div class="camp-icon">📊</div>
            <h3 data-slot="title"></h3><p data-slot="desc"></p>
            <img src="/src/img/3.png" alt="" loading="lazy" class="camp-shot">
          </article>
          <article class="camp-card reveal" data-feature="match-previews">
            <div class="camp-icon">👥</div>
            <h3 data-slot="title"></h3><p data-slot="desc"></p>
            <img src="/src/img/4.png" alt="" loading="lazy" class="camp-shot">
          </article>
          <article class="camp-card reveal" data-feature="my-team">
            <div class="camp-icon">🏳️</div>
            <h3 data-slot="title"></h3><p data-slot="desc"></p>
            <img src="/src/img/5.png" alt="" loading="lazy" class="camp-shot">
          </article>
          <article class="camp-card reveal" data-feature="match-stats">
            <div class="camp-icon">📈</div>
            <h3 data-slot="title"></h3><p data-slot="desc"></p>
            <img src="/src/img/6.png" alt="" loading="lazy" class="camp-shot">
          </article>
        </div>
      </div>
    </section>

    <section id="how" class="campaign-how">
      <div class="container">
        <h2 class="campaign-heading reveal">How it works</h2>
        <div data-slot="steps" class="camp-steps"></div>
      </div>
    </section>

    <section id="pricing" class="campaign-pricing">
      <div class="container pricing-campaign reveal">
        <h2 class="campaign-heading">Get match-ready</h2>
        <p data-copy="pricing.trialText"></p>
        <p data-copy="pricing.monthlyText"></p>
        <p class="legal" data-copy="pricing.legalText"></p>
        <a href="#" class="campaign-cta">Download on the App Store</a>
      </div>
    </section>

    <section class="campaign-privacy"><div class="container reveal"><p data-copy="privacyText"></p></div></section>
  </main>

  <footer class="campaign-footer">
    <div class="container footer-inner">
      <span data-copy="appName"></span>
      <nav class="footer-links" data-slot="footer-links"></nav>
    </div>
  </footer>
  <script type="module" src="script.js"></script>
</body>
</html>
