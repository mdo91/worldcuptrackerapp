<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>goallll — Every World Cup moment. One app.</title>
  <link rel="stylesheet" href="../../src/css/tokens.css">
  <link rel="stylesheet" href="../../src/css/shared.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="split-header">
    <a href="../../index.html" class="logo" data-copy="appName">goallll</a>
    <button class="nav-toggle" aria-label="Menu" aria-expanded="false">☰</button>
    <nav class="nav-links">
      <a href="#features">Features</a>
      <a href="#how">How it works</a>
      <a href="#pricing">Pricing</a>
    </nav>
  </header>

  <main class="split-main">
    <div class="split-left">
      <section class="hero split-hero">
        <p class="tag" data-copy="tagline"></p>
        <h1 data-copy="heroHeadline"></h1>
        <p class="sub" data-copy="heroSubheadline"></p>
        <a href="#" class="app-store-btn app-store-btn--blue">Download on the App Store</a>
        <a href="#how" class="secondary-link" data-copy="ctaSecondary">See how it works</a>
      </section>

      <section id="features" class="split-features">
        <article data-feature="live-scores" class="feat reveal"><h3 data-slot="title"></h3><p data-slot="desc"></p></article>
        <article data-feature="daily-schedule" class="feat reveal"><h3 data-slot="title"></h3><p data-slot="desc"></p></article>
        <article data-feature="groups-standings" class="feat reveal"><h3 data-slot="title"></h3><p data-slot="desc"></p></article>
        <article data-feature="match-previews" class="feat reveal"><h3 data-slot="title"></h3><p data-slot="desc"></p></article>
        <article data-feature="my-team" class="feat reveal"><h3 data-slot="title"></h3><p data-slot="desc"></p></article>
        <article data-feature="match-stats" class="feat reveal"><h3 data-slot="title"></h3><p data-slot="desc"></p></article>
      </section>

      <section id="how" class="split-how">
        <h2>How it works</h2>
        <div data-slot="steps"></div>
      </section>

      <section id="pricing" class="split-pricing">
        <h2>Pricing</h2>
        <p data-copy="pricing.trialText"></p>
        <p data-copy="pricing.monthlyText"></p>
        <p class="legal" data-copy="pricing.legalText"></p>
        <a href="#" class="app-store-btn">Download on the App Store</a>
      </section>

      <section class="split-privacy"><p data-copy="privacyText"></p></section>

      <footer class="split-footer">
        <span data-copy="appName"></span>
        <nav class="footer-links" data-slot="footer-links"></nav>
      </footer>
    </div>

    <aside class="split-right" aria-label="App screenshots">
      <div class="sticky-phone">
        <div class="phone-carousel">
          <div class="phone-mockup"><div class="phone-mockup__bezel"><img src="/src/img/1.png" alt="Follow every match in real time with live score" loading="lazy" data-carousel="0"></div></div>
        </div>
        <div class="thumb-row">
          <button class="thumb active" data-index="0" aria-label="Live scores"><img src="/src/img/1.png" alt="" loading="lazy"></button>
          <button class="thumb" data-index="1" aria-label="Daily schedule"><img src="/src/img/2.png" alt="" loading="lazy"></button>
          <button class="thumb" data-index="2" aria-label="Groups"><img src="/src/img/3.png" alt="" loading="lazy"></button>
          <button class="thumb" data-index="3" aria-label="Lineups"><img src="/src/img/4.png" alt="" loading="lazy"></button>
          <button class="thumb" data-index="4" aria-label="My team"><img src="/src/img/5.png" alt="" loading="lazy"></button>
          <button class="thumb" data-index="5" aria-label="Match stats"><img src="/src/img/6.png" alt="" loading="lazy"></button>
        </div>
      </div>
    </aside>
  </main>
  <script type="module" src="script.js"></script>
</body>
</html>
