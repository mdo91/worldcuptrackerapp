<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>goallll — Every World Cup moment. One app.</title>
  <link rel="stylesheet" href="../../src/css/tokens.css">
  <link rel="stylesheet" href="../../src/css/shared.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="timeline-header">
    <a href="../../index.html" class="logo" data-copy="appName">goallll</a>
    <button class="nav-toggle" aria-label="Menu" aria-expanded="false">☰</button>
    <nav class="nav-links">
      <a href="#story">Story</a>
      <a href="#how">How it works</a>
      <a href="#pricing">Pricing</a>
    </nav>
  </header>

  <main>
    <section class="timeline-intro">
      <div class="container narrow reveal">
        <p data-copy="tagline"></p>
        <h1 data-copy="heroHeadline"></h1>
        <p data-copy="heroSubheadline"></p>
        <a href="#" class="app-store-btn app-store-btn--blue">Download on the App Store</a>
      </div>
    </section>

    <section id="story" class="timeline">
      <div class="timeline-line" aria-hidden="true"></div>

      <article class="timeline-item reveal" data-feature="live-scores">
        <div class="timeline-marker">⚽</div>
        <div class="timeline-content">
          <h3 data-slot="title"></h3>
          <p data-slot="desc"></p>
          <div class="phone-mockup"><div class="phone-mockup__bezel"><img src="/src/img/1.png" alt="" loading="lazy"></div></div>
        </div>
      </article>

      <article class="timeline-item reveal alt" data-feature="daily-schedule">
        <div class="timeline-marker">📅</div>
        <div class="timeline-content">
          <h3 data-slot="title"></h3>
          <p data-slot="desc"></p>
          <div class="phone-mockup"><div class="phone-mockup__bezel"><img src="/src/img/2.png" alt="" loading="lazy"></div></div>
        </div>
      </article>

      <article class="timeline-item reveal" data-feature="groups-standings">
        <div class="timeline-marker">📊</div>
        <div class="timeline-content">
          <h3 data-slot="title"></h3>
          <p data-slot="desc"></p>
          <div class="phone-mockup"><div class="phone-mockup__bezel"><img src="/src/img/3.png" alt="" loading="lazy"></div></div>
        </div>
      </article>

      <article class="timeline-item reveal alt" data-feature="match-previews">
        <div class="timeline-marker">👥</div>
        <div class="timeline-content">
          <h3 data-slot="title"></h3>
          <p data-slot="desc"></p>
          <div class="phone-mockup"><div class="phone-mockup__bezel"><img src="/src/img/4.png" alt="" loading="lazy"></div></div>
        </div>
      </article>

      <article class="timeline-item reveal" data-feature="my-team">
        <div class="timeline-marker">🏳️</div>
        <div class="timeline-content">
          <h3 data-slot="title"></h3>
          <p data-slot="desc"></p>
          <div class="phone-mockup"><div class="phone-mockup__bezel"><img src="/src/img/5.png" alt="" loading="lazy"></div></div>
        </div>
      </article>

      <article class="timeline-item reveal alt" data-feature="match-stats">
        <div class="timeline-marker">📈</div>
        <div class="timeline-content">
          <h3 data-slot="title"></h3>
          <p data-slot="desc"></p>
          <div class="phone-mockup"><div class="phone-mockup__bezel"><img src="/src/img/6.png" alt="" loading="lazy"></div></div>
        </div>
      </article>
    </section>

    <section id="how" class="timeline-how">
      <div class="container narrow">
        <h2 class="section-title reveal">How it works</h2>
        <div data-slot="steps" class="steps-vertical"></div>
      </div>
    </section>

    <section id="pricing" class="timeline-pricing">
      <div class="container narrow reveal">
        <h2 class="section-title">Pricing</h2>
        <p data-copy="pricing.trialText"></p>
        <p data-copy="pricing.monthlyText"></p>
        <p class="legal" data-copy="pricing.legalText"></p>
        <a href="#" class="app-store-btn app-store-btn--blue">Download on the App Store</a>
      </div>
    </section>

    <section class="timeline-privacy"><div class="container narrow reveal"><p data-copy="privacyText"></p></div></section>
  </main>

  <footer class="timeline-footer">
    <div class="container footer-inner">
      <span data-copy="appName"></span>
      <nav class="footer-links" data-slot="footer-links"></nav>
    </div>
  </footer>
  <script type="module" src="script.js"></script>
</body>
</html>
