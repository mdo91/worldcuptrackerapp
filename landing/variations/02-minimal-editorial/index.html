<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>goallll — Every World Cup moment. One app.</title>
  <meta name="description" content="Live World Cup scores, groups, and match previews for iOS.">
  <link rel="stylesheet" href="../../src/css/tokens.css">
  <link rel="stylesheet" href="../../src/css/shared.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="../../index.html" class="logo" data-copy="appName">goallll</a>
      <button class="nav-toggle" aria-label="Menu" aria-expanded="false"><span></span></button>
      <nav class="nav-links">
        <a href="#features">Features</a>
        <a href="#how">How it works</a>
        <a href="#pricing">Pricing</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero editorial">
      <div class="container narrow">
        <p class="kicker reveal" data-copy="tagline"></p>
        <h1 class="reveal" data-copy="heroHeadline"></h1>
        <p class="lede reveal" data-copy="heroSubheadline"></p>
        <div class="hero-cta reveal">
          <a href="#" class="app-store-btn">Download on the App Store</a>
        </div>
        <figure class="hero-figure reveal">
          <div class="phone-mockup"><div class="phone-mockup__bezel">
            <img src="/src/img/1.png" alt="Follow every match in real time with live score" loading="lazy">
          </div></div>
        </figure>
      </div>
    </section>

    <section id="features" class="features-editorial">
      <div class="container">
        <div class="editorial-grid">
          <article class="editorial-item reveal" data-feature="live-scores">
            <span class="num">01</span>
            <h3 data-slot="title"></h3>
            <p data-slot="desc"></p>
            <div class="phone-mockup small"><div class="phone-mockup__bezel"><img src="/src/img/1.png" alt="" loading="lazy"></div></div>
          </article>
          <article class="editorial-item reveal" data-feature="daily-schedule">
            <span class="num">02</span>
            <h3 data-slot="title"></h3>
            <p data-slot="desc"></p>
            <div class="phone-mockup small"><div class="phone-mockup__bezel"><img src="/src/img/2.png" alt="" loading="lazy"></div></div>
          </article>
          <article class="editorial-item reveal" data-feature="groups-standings">
            <span class="num">03</span>
            <h3 data-slot="title"></h3>
            <p data-slot="desc"></p>
            <div class="phone-mockup small"><div class="phone-mockup__bezel"><img src="/src/img/3.png" alt="" loading="lazy"></div></div>
          </article>
          <article class="editorial-item reveal" data-feature="match-previews">
            <span class="num">04</span>
            <h3 data-slot="title"></h3>
            <p data-slot="desc"></p>
            <div class="phone-mockup small"><div class="phone-mockup__bezel"><img src="/src/img/4.png" alt="" loading="lazy"></div></div>
          </article>
          <article class="editorial-item reveal" data-feature="my-team">
            <span class="num">05</span>
            <h3 data-slot="title"></h3>
            <p data-slot="desc"></p>
            <div class="phone-mockup small"><div class="phone-mockup__bezel"><img src="/src/img/5.png" alt="" loading="lazy"></div></div>
          </article>
          <article class="editorial-item reveal" data-feature="match-stats">
            <span class="num">06</span>
            <h3 data-slot="title"></h3>
            <p data-slot="desc"></p>
            <div class="phone-mockup small"><div class="phone-mockup__bezel"><img src="/src/img/6.png" alt="" loading="lazy"></div></div>
          </article>
        </div>
      </div>
    </section>

    <section id="how" class="how-editorial">
      <div class="container narrow">
        <h2 class="section-title reveal">How it works</h2>
        <div class="steps-list" data-slot="steps"></div>
      </div>
    </section>

    <section id="pricing" class="pricing-editorial">
      <div class="container narrow">
        <h2 class="section-title reveal">Pricing</h2>
        <div class="pricing-box reveal">
          <p data-copy="pricing.trialText"></p>
          <p data-copy="pricing.monthlyText"></p>
          <p class="legal" data-copy="pricing.legalText"></p>
          <a href="#" class="app-store-btn app-store-btn--blue">Download on the App Store</a>
        </div>
      </div>
    </section>

    <section class="privacy-editorial">
      <div class="container narrow reveal"><p data-copy="privacyText"></p></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span data-copy="appName"></span>
      <nav class="footer-links" data-slot="footer-links"></nav>
    </div>
  </footer>
  <script type="module" src="script.js"></script>
</body>
</html>
